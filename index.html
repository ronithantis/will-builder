const mkPerson = () => ({ full_name:"", id_number:"", address:"", phone:"", email:"" });
const mkBen = (i) => ({ beneficiary_id:`b${i}`, full_name:"", id_number:"", address:"", relation:"child", is_minor:false });
const mkAsset = (i) => ({ asset_id:`a${i}`, asset_type:"real_estate", label:"", notes:"",
  // real_estate
  re_address:"", include_contents:"none", contents_exceptions:[],
  // bank
  bank_name:"", account_number:"", branch:"",
  // vehicle
  license_plate:"", vehicle_make:"", vehicle_model:"",
  // business
  company_number:"", business_address:"",
  // insurance
  policy_number:"", insurer:"", insurance_current_beneficiary:"", insurance_to_beneficiary:"",
  // digital
  digital_sub_types:[], digital_scope:"all", digital_other_detail:"", digital_passwords:"",
  // investment / valuables
  identifier:"",
  // other
  other_description:""
});
const mkDebt = (i) => ({ debt_id:`d${i}`, creditor_name:"", amount:"", currency:"ILS", notes:"" });
const mkCredit = (i) => ({ credit_id:`c${i}`, debtor_name:"", amount:"", currency:"ILS", notes:"" });
const mkGift = (i) => ({ gift_id:`g${i}`, gift_type:"asset", asset_id:"", bank_account_id:"", amount:"", currency:"ILS", items:[], to_beneficiary_id:"", to_beneficiaries:[], multi_ben:false, fallback_beneficiary_id:"", fallback_type:"person", fallback_free_text:"" });
const INIT_NO_CONTEST = { enabled:false, penalty:"equal_share", other_name:"", other_id:"", other_address:"" };

const INITIAL = {
  meta:{ doc_version:"1.0", generation_date:new Date().toISOString().slice(0,10) },
  will:{ type:"", signature_mode:"" },
  parties:{ testators:[mkPerson()], beneficiaries:[], executor:null, alt_executor:null, trustee:null, witnesses:[mkPerson(),mkPerson()] },
  assets:[], debts:[], credits:[],
  distributions:{ specific_gifts:[], residual:{mode:"equal",percentages:[]}, predeceased_rule:{mode:"descendants"}, minor_trust:{enabled:false,trust_age_until:21,release_age:21}, mutual_options:{first_death_mode:"all_to_survivor",first_death_split:{survivor_percent:50,children_percent:50},survivor_powers:"full",gift_cap_amount:50000,material_asset_definition:'דירת מגורים, רכב, חשבון בנק מעל 100,000 ₪',simultaneous_death_days:30} },
  signature:{ date:new Date().toISOString().slice(0,10), city:"", testator_sign_line:true },
  annexes:{ finance_beneficiaries_schedule:true },
  output_choice:"",
  no_contest:{ enabled:false, penalty:"equal_share", other_name:"", other_id:"", other_address:"" },
  privacy_accepted: false
};

function AudioBtn({ label, audioKey }) {
  const [playing, setPlaying] = useState(false);
  const [loading, setLoading] = useState(false);
  const audioRef = useRef(null);

  useEffect(() => {
    return () => { if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; } };
  }, []);

  const toggle = () => {
    const src = audioKey && AUDIO_MAP[audioKey];
    if (!src) return;
    if (playing && audioRef.current) {
      audioRef.current.pause();
      setPlaying(false);
      return;
    }
    if (!audioRef.current) {
      setLoading(true);
      const a = new Audio(src);
      audioRef.current = a;
      a.oncanplaythrough = () => setLoading(false);
      a.onended = () => { setPlaying(false); audioRef.current = null; };
      a.onerror = () => { setPlaying(false); setLoading(false); audioRef.current = null; };
    }
    audioRef.current.play().then(() => setPlaying(true)).catch(() => setLoading(false));
  };

  const hasAudio = !!(audioKey && AUDIO_MAP[audioKey]);
  return (
    <button onClick={toggle} disabled={!hasAudio}
      title={hasAudio ? `האזן: ${label}` : "אין קובץ קול"}
      style={{background:playing?C.goldPale:loading?"#fff8e6":"#f4f2ed",border:`1.5px solid ${playing||loading?C.gold:hasAudio?C.gold:C.border}`,borderRadius:20,padding:"4px 12px",fontSize:11,color:playing||loading?C.gold:hasAudio?C.gold:C.textLight,display:"inline-flex",alignItems:"center",gap:5,cursor:hasAudio?"pointer":"default",transition:"all 0.2s",boxShadow:playing?"0 0 0 3px rgba(184,146,28,0.15)":"none"}}>
      <span style={{fontSize:13}}>{loading?"⏳":playing?"⏸":"🔊"}</span>
      <span>{loading?"טוען...":playing?"עצור":"הסבר קולי"}</span>
      {playing && <span style={{display:"inline-flex",gap:2,alignItems:"center"}}>
        {[0,1,2].map(i=>(
          <span key={i} style={{display:"inline-block",width:2,background:C.gold,borderRadius:1,animation:`audioBar${i} 0.6s ease-in-out ${i*0.15}s infinite alternate`,height:8}}/>
        ))}
      </span>}
    </button>
  );
}

function Accordion({ title, children, icon="ℹ️", defaultOpen=false }) {
  const [o,setO] = useState(defaultOpen);
  return <div style={{border:`1px solid ${C.border}`,borderRadius:9,overflow:"hidden",marginBottom:10}}>
    <button onClick={()=>setO(!o)} style={{width:"100%",background:o?C.goldPale:"#f7f5f0",border:"none",padding:"10px 14px",textAlign:"right",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,fontWeight:600,color:C.navy,cursor:"pointer"}}>
      <span>{icon} {title}</span><span style={{color:C.gold,transform:o?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
    </button>
    {o && <div style={{padding:"12px 14px",background:C.white,fontSize:13,lineHeight:1.75,color:C.text,borderTop:`1px solid ${C.border}`}}>{children}</div>}
  </div>;
}

function InfoNote({ type="info", children }) {
  const s = {info:{bg:"#eef3fc",b:"#2a4a8f",i:"ℹ️"},warning:{bg:"#fff8e6",b:C.gold,i:"⚠️"},important:{bg:C.errorBg,b:C.error,i:"❗"}}[type];
  return <div style={{background:s.bg,borderRight:`4px solid ${s.b}`,borderRadius:"0 8px 8px 0",padding:"9px 12px",marginBottom:10,fontSize:13,lineHeight:1.65,color:C.text}}>{s.i} {children}</div>;
}

function Label({ children, required }) {
  return <label style={{display:"block",fontSize:13,fontWeight:600,color:C.navy,marginBottom:4}}>{children}{required&&<span style={{color:C.error,marginRight:3}}>*</span>}</label>;
}

function FieldRow({ children, cols=2 }) {
  return <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:10,marginBottom:10}}>{children}</div>;
}

function Tag({ children, color=C.navy }) {
  return <span style={{background:color,color:C.white,borderRadius:20,padding:"2px 9px",fontSize:10,fontWeight:600}}>{children}</span>;
}

function ChoiceCard({ selected, onClick, title, subtitle, icon }) {
  return <div onClick={onClick} style={{border:`2px solid ${selected?C.navyLight:C.border}`,borderRadius:11,padding:"14px 16px",cursor:"pointer",background:selected?"#eef3fc":C.white,transition:"all 0.2s",display:"flex",alignItems:"flex-start",gap:12,boxShadow:selected?"0 2px 10px rgba(42,74,143,0.12)":"0 1px 3px rgba(0,0,0,0.04)",marginBottom:10}}>
    <div style={{fontSize:24,flexShrink:0}}>{icon}</div>
    <div style={{flex:1}}>
      <div style={{fontWeight:700,color:selected?C.navyLight:C.text,fontSize:14,marginBottom:3}}>{title}</div>
      {subtitle&&<div style={{fontSize:12,color:C.textMuted,lineHeight:1.5}}>{subtitle}</div>}
    </div>
    <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${selected?C.navyLight:C.border}`,background:selected?C.navyLight:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
      {selected&&<span style={{color:C.white,fontSize:11}}>✓</span>}
    </div>
  </div>;
}

function PersonForm({ person, onChange, label, index, onRemove, showEmail=true }) {
  const up = k => e => onChange({...person,[k]:e.target.value});
  return <div style={{background:"#f7f5f0",borderRadius:9,padding:14,marginBottom:12,border:`1px solid ${C.border}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <span style={{fontWeight:700,color:C.navy,fontSize:13}}>{label}{index!=null?` ${index+1}`:""}</span>
      {onRemove&&<button onClick={onRemove} style={{background:"none",border:"none",color:C.error,fontSize:16,cursor:"pointer"}}>✕</button>}
    </div>
    <FieldRow><div><Label required>שם מלא</Label><input value={person.full_name} onChange={up("full_name")} placeholder="שם פרטי ושם משפחה"/></div><div><Label required>מספר ת.ז.</Label><input value={person.id_number} onChange={up("id_number")} placeholder="000000000" maxLength={9}/></div></FieldRow>
    <div style={{marginBottom:10}}><Label required>כתובת</Label><input value={person.address} onChange={up("address")} placeholder="רחוב, מספר, עיר"/></div>
    <FieldRow><div><Label>טלפון</Label><input value={person.phone||""} onChange={up("phone")} placeholder="05X-XXXXXXX"/></div>{showEmail&&<div><Label>אימייל</Label><input value={person.email||""} onChange={up("email")} placeholder="name@email.com" dir="ltr"/></div>}</FieldRow>
  </div>;
}

function BenForm({ ben, onChange, index, onRemove }) {
  const up = k => e => onChange({...ben,[k]:e.target.value});
  const isOrg = ben.relation==="organization";
  const isOther = ben.relation==="other";
  return <div style={{background:"#f7f5f0",borderRadius:9,padding:14,marginBottom:12,border:`1px solid ${C.border}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <span style={{fontWeight:700,color:C.navy,fontSize:13}}>מוטב {index+1}</span>
      <button onClick={onRemove} style={{background:"none",border:"none",color:C.error,fontSize:16,cursor:"pointer"}}>✕</button>
    </div>
    <FieldRow>
      <div><Label required>{isOrg?"שם העמותה / הארגון":"שם מלא"}</Label><input value={ben.full_name} onChange={up("full_name")} placeholder={isOrg?"שם העמותה...":"שם מלא"}/></div>
      <div><Label required>{isOrg?"מספר עמותה / ח.פ.":"ת.ז."}</Label><input value={ben.id_number} onChange={up("id_number")} placeholder={isOrg?"580000000":"000000000"}/></div>
    </FieldRow>
    <FieldRow>
      <div><Label required>קשר</Label><select value={ben.relation} onChange={up("relation")}>{Object.entries(RELATION_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>
      {!isOrg&&<div style={{display:"flex",flexDirection:"column",justifyContent:"flex-end"}}><label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:13,paddingBottom:8}}><input type="checkbox" checked={ben.is_minor} onChange={e=>onChange({...ben,is_minor:e.target.checked})} style={{width:"auto"}}/>קטין/ה</label></div>}
    </FieldRow>
    <div style={{marginBottom:10}}><Label required>{isOrg?"כתובת העמותה":"כתובת"}</Label><input value={ben.address} onChange={up("address")} placeholder={isOrg?"כתובת העמותה":"רחוב, מספר, עיר"}/></div>

      <FieldRow>

        <div><Label>טלפון</Label><input value={ben.org_phone||""} onChange={up("org_phone")} placeholder="050-0000000"/></div>
      </FieldRow>
      <div style={{marginBottom:10}}><Label>אימייל</Label><input value={ben.org_email||""} onChange={up("org_email")} placeholder="contact@org.org.il"/></div>
      <div><Label>מטרת ההוראה / ייעוד התרומה (אופציונלי)</Label><textarea value={ben.org_purpose||""} onChange={up("org_purpose")} placeholder="לדוגמה: לקרן המלגות, לפעילות ספציפית..." style={{minHeight:45}}/></div>
    </>}
    {isOther&&<>
      <div style={{marginBottom:10}}><Label>תיאור הקשר</Label><input value={ben.other_description||""} onChange={up("other_description")} placeholder="לדוגמה: שכן, עמית לעבודה..."/></div>
      <div><Label>פרטים נוספים</Label><textarea value={ben.other_notes||""} onChange={up("other_notes")} placeholder="כל מידע רלוונטי נוסף..." style={{minHeight:45}}/></div>

function AssetForm({ asset, onChange, index, onRemove }) {
  const up = k => v => onChange({...asset,[k]:v});
  const upE = k => e => onChange({...asset,[k]:e.target.value});
  const t = asset.asset_type;

  const toggleDigSub = (key) => {
    const cur = asset.digital_sub_types||[];
    up("digital_sub_types")(cur.includes(key) ? cur.filter(x=>x!==key) : [...cur, key]);
  };

  return <div style={{background:"#f7f5f0",borderRadius:9,padding:14,marginBottom:12,border:`1px solid ${C.border}`}}>

    </div>

    {/* Type + Label */}

          {Object.entries(ASSET_TYPE_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
        </select>
      </div>
      <div><Label required>כינוי / תיאור קצר</Label>
        <input value={asset.label} onChange={upE("label")} placeholder={t==="real_estate"?"דירה בתל אביב":t==="vehicle"?"טויוטה קורולה":t==="insurance"?"ביטוח מנהלים – מגדל":t==="business"?"עסק – מסעדת הים":""}/>
      </div>
    </FieldRow>

    {/* ── נדל"ן ── */}
    {t==="real_estate"&&<>
      <div style={{marginBottom:10}}><Label>כתובת הנכס</Label><input value={asset.re_address} onChange={upE("re_address")} placeholder="רחוב הרצל 1, תל אביב, גוש/חלקה"/></div>
      <div style={{marginBottom:10}}><Label>תכולה</Label>

        <div><Label>מספר חשבון</Label><input value={asset.account_number} onChange={upE("account_number")} placeholder="123456"/></div>

    </>}

    {/* ── השקעות / קופות ── */}
    {t==="investment"&&<>
      <div style={{marginBottom:10}}><Label>מספר פוליסה / חשבון</Label><input value={asset.identifier} onChange={upE("identifier")} placeholder="מספר חשבון / פוליסה"/></div>
      <div><Label>הערות</Label><textarea value={asset.notes} onChange={upE("notes")} placeholder="פירוט נוסף" style={{minHeight:50}}/></div>

    {t==="valuables"&&<>
      <div style={{marginBottom:10}}><Label required>תיאור התכשיט / החפץ</Label><input value={asset.valuables_description||""} onChange={upE("valuables_description")} placeholder="שרשרת זהב עם תליון לב, תכשיט עתיק, שעון מותג..."/></div>

    {/* ── רכב ── */}
    {t==="vehicle"&&<>

function assetOptionLabel(a) {
  const base = a.label || ASSET_TYPE_LABELS[a.asset_type] || "נכס";
  if (a.asset_type==="real_estate") return base + (a.re_address ? " — " + a.re_address : "");
  if (a.asset_type==="bank_account") return base + (a.bank_name ? " — " + a.bank_name : "") + (a.account_number ? " מס\' " + a.account_number : "");
  if (a.asset_type==="vehicle") return base + (a.vehicle_make ? " " + a.vehicle_make : "") + (a.vehicle_model ? " " + a.vehicle_model : "") + (a.license_plate ? " (" + a.license_plate + ")" : "");
  if (a.asset_type==="insurance") return base + (a.insurer ? " — " + a.insurer : "") + (a.policy_number ? " מס\' " + a.policy_number : "");
  if (a.asset_type==="valuables") return base + (a.valuables_description ? " — " + a.valuables_description : "");
  return base;
}

function StepGifts({ data, setData }) {
  const gifts=data.distributions.specific_gifts, bens=data.parties.beneficiaries, assets=data.assets;
  const add = () => setData(d=>({...d,distributions:{...d.distributions,specific_gifts:[...d.distributions.specific_gifts,mkGift(d.distributions.specific_gifts.length+1)]}}));
  const upd = (i,v) => setData(d=>{const g=[...d.distributions.specific_gifts];g[i]=v;return{...d,distributions:{...d.distributions,specific_gifts:g}};});
  const rem = (i) => setData(d=>({...d,distributions:{...d.distributions,specific_gifts:d.distributions.specific_gifts.filter((_,j)=>j!==i)}}));

  // Assets already designated in previous gifts
  const usedAssetIds = (idx) => gifts.slice(0, idx).map(g=>g.asset_id).filter(Boolean);

  return <div>
    <h2 style={{fontSize:20,color:C.navy,marginBottom:3}}>ייעוד נכסים ספציפיים</h2>
    <p style={{fontSize:12,color:C.textMuted,marginBottom:8}}>(Specific Bequests)</p>
    <div style={{marginTop:6}}><AudioBtn label="ייעוד נכסים" audioKey="specific_gifts"/></div>
    <Accordion title="מה ההבדל בין ייעוד ספציפי לחלוקת העיזבון?" icon="💡" defaultOpen>
      <p style={{marginBottom:8,lineHeight:1.75,fontSize:13}}>
        <strong>ייעוד ספציפי</strong> — כאן תקבעו מה מגיע <em>למי בדיוק</em>: נכס מסוים, סכום קבוע, חשבון בנק, או חפצים.
        לדוגמה: "הדירה בתל אביב — לבתי רחל", "הרכב — לבני דוד".
      </p>
      <p style={{marginBottom:8,lineHeight:1.75,fontSize:13}}>
        <strong>חלוקת יתרת העיזבון</strong> (השלב הבא) — מה שנשאר <em>לאחר</em> כל הייעודים הספציפיים, יחולק לפי אחוזים או בחלקים שווים.
      </p>
      <div style={{background:"#fff8e6",border:`1px solid ${C.gold}`,borderRadius:7,padding:"8px 11px",fontSize:12.5,lineHeight:1.7}}>
        ⚠️ נכסים שיועדו בייעוד קודם לא יופיעו ברשימה של ייעוד הבא.
      </div>
    </Accordion>
    <div style={{marginTop:10}}>
      {gifts.length===0&&<div style={{textAlign:"center",padding:20,color:C.textMuted,background:"#f7f5f0",borderRadius:9,marginBottom:12,fontSize:13}}>אופציונלי — ניתן לדלג אם רוצים לחלק הכל באחוזים/שווה</div>}
      {gifts.map((g,i)=>{
        const up=(k,v)=>upd(i,{...g,[k]:v});
        const usedIds = usedAssetIds(i);
        const availableAssets = assets.filter(a=>!usedIds.includes(a.asset_id));
        const bankAssets = assets.filter(a=>a.asset_type==="bank_account");
        // multi-beneficiary total
        const multiTotal = (g.to_beneficiaries||[]).reduce((s,x)=>s+(Number(x.percent)||0),0);
        const addMultiBen = (bid) => {
          if(!(g.to_beneficiaries||[]).find(x=>x.beneficiary_id===bid))
            up("to_beneficiaries",[...(g.to_beneficiaries||[]),{beneficiary_id:bid,percent:0}]);
        };
        const removeMultiBen = (bid) => up("to_beneficiaries",(g.to_beneficiaries||[]).filter(x=>x.beneficiary_id!==bid));
        const setMultiPct = (bid,pct) => up("to_beneficiaries",(g.to_beneficiaries||[]).map(x=>x.beneficiary_id===bid?{...x,percent:Number(pct)}:x));

        return <div key={g.gift_id} style={{background:"#f7f5f0",borderRadius:9,padding:14,marginBottom:12,border:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <span style={{fontWeight:700,color:C.navy,fontSize:13}}>ייעוד {i+1}</span>
            <button onClick={()=>rem(i)} style={{background:"none",border:"none",color:C.error,cursor:"pointer"}}>✕</button>
          </div>

          {/* Gift type */}
          <div style={{marginBottom:10}}>
            <Label>סוג</Label>
            <select value={g.gift_type} onChange={e=>up("gift_type",e.target.value)}>
              <option value="asset">נכס ספציפי מהרשימה</option>
              <option value="bank_account">חשבון בנק</option>
              <option value="amount">סכום כסף</option>
              <option value="item_list">חפצים / פריטים</option>
            </select>
          </div>

          {/* Asset selection — available only (not yet used) */}
          {g.gift_type==="asset"&&<div style={{marginBottom:10}}>
            <Label>בחר נכס</Label>
            <select value={g.asset_id} onChange={e=>up("asset_id",e.target.value)}>
              <option value="">-- בחר נכס מהרשימה --</option>
              {availableAssets.map(a=><option key={a.asset_id} value={a.asset_id}>{assetOptionLabel(a)}</option>)}
            </select>
            {usedIds.length>0&&<div style={{fontSize:11,color:C.textMuted,marginTop:3}}>נכסים שכבר יועדו אינם מוצגים</div>}
          </div>}

          {/* Bank account gift */}
          {g.gift_type==="bank_account"&&<div style={{marginBottom:10}}>
            <Label>בחר חשבון בנק</Label>
            {bankAssets.length>0
              ?<select value={g.bank_account_id||""} onChange={e=>up("bank_account_id",e.target.value)}>
                <option value="">-- בחר חשבון --</option>
                {bankAssets.map(a=><option key={a.asset_id} value={a.asset_id}>{assetOptionLabel(a)}</option>)}
              </select>
              :<div style={{fontSize:12,color:C.textMuted,marginTop:4}}>לא הוזנו חשבונות בנק בשלב הנכסים. <strong>הוסף חשבון בנק בשלב הנכסים תחילה.</strong></div>}
          </div>}

          {/* Amount */}
          {g.gift_type==="amount"&&<FieldRow>
            <div><Label>סכום</Label><input type="number" value={g.amount} onChange={e=>up("amount",e.target.value)} placeholder="0"/></div>
            <div><Label>מטבע</Label><select value={g.currency} onChange={e=>up("currency",e.target.value)}><option value="ILS">₪ שקל</option><option value="USD">$ דולר</option><option value="EUR">€ יורו</option></select></div>
          </FieldRow>}

          {/* Items */}
          {g.gift_type==="item_list"&&<div style={{marginBottom:10}}>
            <Label>פרט את החפצים (הפרד בפסיק)</Label>
            <input value={g.items.join(", ")} onChange={e=>up("items",e.target.value.split(",").map(s=>s.trim()).filter(Boolean))} placeholder="שעון זהב, ספרייה, ציור שמן..."/>
          </div>}

          {/* Beneficiary — single or multi */}
          <div style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <Label required>מוטב/ת</Label>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:C.navyLight,cursor:"pointer"}}>
                <input type="checkbox" checked={g.multi_ben||false} onChange={e=>up("multi_ben",e.target.checked)} style={{width:"auto"}}/> מספר מוטבים
              </label>
            </div>
            {!g.multi_ben
              ?<select value={g.to_beneficiary_id} onChange={e=>up("to_beneficiary_id",e.target.value)}>
                <option value="">-- בחר מוטב --</option>
                {bens.map(b=><option key={b.beneficiary_id} value={b.beneficiary_id}>{b.full_name||"מוטב"}</option>)}
              </select>
              :<div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                  {bens.filter(b=>!(g.to_beneficiaries||[]).find(x=>x.beneficiary_id===b.beneficiary_id)).map(b=>
                    <button key={b.beneficiary_id} onClick={()=>addMultiBen(b.beneficiary_id)}
                      style={{padding:"4px 10px",borderRadius:14,border:`1.5px dashed ${C.navyLight}`,background:"white",color:C.navyLight,fontSize:12,cursor:"pointer"}}>
                      + {b.full_name||"מוטב"}
                    </button>
                  )}
                </div>
                {(g.to_beneficiaries||[]).map(x=>{
                  const b=bens.find(b=>b.beneficiary_id===x.beneficiary_id);
                  if(!b) return null;
                  return <div key={x.beneficiary_id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:7,background:"white",padding:"6px 10px",borderRadius:8,border:`1px solid ${C.border}`}}>
                    <span style={{flex:1,fontSize:13,fontWeight:500}}>{b.full_name}</span>
                    <input type="number" min={0} max={100} value={x.percent} onChange={e=>setMultiPct(x.beneficiary_id,e.target.value)} style={{width:60}}/>
                    <span style={{fontSize:12,color:C.textMuted}}>%</span>
                    <button onClick={()=>removeMultiBen(x.beneficiary_id)} style={{background:"none",border:"none",color:C.error,cursor:"pointer",fontSize:13}}>✕</button>
                  </div>;
                })}
                {(g.to_beneficiaries||[]).length>1&&<div style={{fontSize:12,fontWeight:700,color:multiTotal===100?C.success:C.error}}>סה"כ: {multiTotal}% {multiTotal!==100?"— חייב להסתכם ב-100%":"✓"}</div>}
              </div>
            }
          </div>

          {/* Fallback */}
          <div style={{marginBottom:4}}>
            <Label>אם המוטב נפטר לפניי</Label>
            <select value={g.fallback_type||"person"} onChange={e=>up("fallback_type",e.target.value)} style={{marginBottom:6}}>
              <option value="none">יעבור ליתרת העיזבון</option>
              <option value="person">מוטב חלופי ספציפי</option>
              <option value="descendants">לצאצאי המוטב</option>
              <option value="other">אחר (פירוט חופשי)</option>
            </select>
            {(g.fallback_type==="person"||!g.fallback_type)&&g.fallback_type!=="none"&&g.fallback_type!=="descendants"&&g.fallback_type!=="other"&&
              <select value={g.fallback_beneficiary_id} onChange={e=>up("fallback_beneficiary_id",e.target.value)}>
                <option value="">-- בחר מוטב חלופי --</option>
                {bens.filter(b=>b.beneficiary_id!==(g.to_beneficiary_id)||g.multi_ben).map(b=><option key={b.beneficiary_id} value={b.beneficiary_id}>{b.full_name}</option>)}
              </select>}
            {g.fallback_type==="other"&&
              <textarea value={g.fallback_free_text||""} onChange={e=>up("fallback_free_text",e.target.value)} placeholder="לדוגמה: יחולק בין צאצאיו ו/או לפי שיקול דעת מנהל העיזבון..." style={{minHeight:50,marginTop:4}}/>}
          </div>
        </div>;
      })}
      <button onClick={add} style={{width:"100%",padding:"11px",borderRadius:9,border:`2px dashed ${C.navyLight}`,background:"transparent",color:C.navyLight,fontSize:13,fontWeight:600,cursor:"pointer"}}>+ הוסף ייעוד ספציפי</button>
    </div>
  </div>;
}

function StepResidual({ data, setData }) {
  const bens=data.parties.beneficiaries, r=data.distributions.residual;
  const setMode = m => { const p=m==="percentages"?bens.map(b=>({beneficiary_id:b.beneficiary_id,percent:Math.round(100/bens.length)})):[];setData(d=>({...d,distributions:{...d.distributions,residual:{mode:m,percentages:p}}})); };
  const setPct = (bid,p) => setData(d=>({...d,distributions:{...d.distributions,residual:{...d.distributions.residual,percentages:d.distributions.residual.percentages.map(x=>x.beneficiary_id===bid?{...x,percent:Number(p)}:x)}}}));
  const total = r.percentages.reduce((s,p)=>s+(Number(p.percent)||0),0);
  return <div>
    <h2 style={{fontSize:20,color:C.navy,marginBottom:3}}>חלוקת יתרת העיזבון</h2>
    <p style={{fontSize:12,color:C.textMuted,marginBottom:8}}>מה שנשאר לאחר כל הייעודים הספציפיים, החובות, וההוצאות</p>
    <div style={{marginTop:6}}><AudioBtn label="חלוקת העיזבון" audioKey="residual"/></div>
    <div style={{background:"#eef3fc",borderRight:`4px solid ${C.navyLight}`,borderRadius:"0 8px 8px 0",padding:"9px 13px",margin:"10px 0",fontSize:13,lineHeight:1.7}}>
      ℹ️ אחוזים אלו מתייחסים לשווי הכספי של <strong>יתרת</strong> העיזבון בלבד. נכסים ספציפיים (דירה, רכב...) יש לייעד בשלב הקודם.
    </div>
    <div style={{marginTop:10}}>
      <ChoiceCard selected={r.mode==="equal"} onClick={()=>setMode("equal")} icon="⚖️" title="חלקים שווים" subtitle="כל המוטבים יקבלו חלק שווה מיתרת העיזבון"/>
      <ChoiceCard selected={r.mode==="percentages"} onClick={()=>setMode("percentages")} icon="📊" title="אחוזים ספציפיים" subtitle="קבעו אחוז שונה לכל מוטב — חייב להסתכם ב-100%"/>
    </div>
    {r.mode==="percentages"&&<div style={{background:"#f7f5f0",borderRadius:9,padding:14,marginTop:10}}>
      {bens.length===0?<p style={{color:C.textMuted,fontSize:13}}>הוסף מוטבים תחילה</p>:bens.map(b=><div key={b.beneficiary_id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><span style={{flex:1,fontSize:13,fontWeight:500}}>{b.full_name||`מוטב`}</span><div style={{width:80}}><input type="number" min={0} max={100} value={r.percentages.find(p=>p.beneficiary_id===b.beneficiary_id)?.percent||0} onChange={e=>setPct(b.beneficiary_id,e.target.value)}/></div><span style={{color:C.textMuted,fontSize:13}}>%</span></div>)}
      {bens.length>0&&<div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,fontWeight:700,fontSize:13,color:total===100?C.success:C.error}}>סה"כ: {total}% {total!==100?"⚠️":"✓"}</div>}
    </div>}
  </div>;
}

function StepPredeceased({ data, setData }) {
  return <div>
    <h2 style={{fontSize:20,color:C.navy,marginBottom:5}}>מה אם מוטב נפטר לפניך?</h2>
    <div style={{marginTop:10}}><AudioBtn label="מוטב שנפטר" audioKey="predeceased"/></div>
    <div style={{marginTop:14}}>
      {[{k:"descendants",i:"👶",t:"לצאצאיו",s:"חלקו יעבור לילדיו/נכדיו."},
        {k:"survivors_only",i:"👥",t:"ליתר המוטבים",s:"חלקו יחולק בין המוטבים החיים."},
        {k:"per_beneficiary_substitute",i:"🔄",t:"מחליף ספציפי",s:"לכל מוטב יוגדר מחליף."}
      ].map(({k,i,t,s})=><ChoiceCard key={k} selected={data.distributions.predeceased_rule.mode===k} onClick={()=>setData(d=>({...d,distributions:{...d.distributions,predeceased_rule:{mode:k}}}))} icon={i} title={t} subtitle={s}/>)}
    </div>
  </div>;
}

function StepExecutor({ data, setData }) {
  const ex=data.parties.executor, alt=data.parties.alt_executor;
  const setEx=v=>setData(d=>({...d,parties:{...d.parties,executor:v}}));
  const setAlt=v=>setData(d=>({...d,parties:{...d.parties,alt_executor:v}}));
  return <div>
    <h2 style={{fontSize:20,color:C.navy,marginBottom:5}}>מינוי מנהל/ת עיזבון</h2>
    <div style={{marginTop:10}}><AudioBtn label="מנהל עיזבון" audioKey="executor"/></div>
    <Accordion title="מהו מנהל עיזבון?" icon="ℹ️">מנהל העיזבון יאתר נכסים, ישלם חובות ויחלק הרכוש.</Accordion>
    <div style={{marginTop:14}}>
      <button onClick={()=>ex?setEx(null):setEx(mkPerson())} style={{width:"100%",padding:"10px",borderRadius:8,border:`1.5px solid ${ex?C.error:C.navyLight}`,background:ex?C.errorBg:"#eef3fc",color:ex?C.error:C.navyLight,fontWeight:600,fontSize:13,marginBottom:12}}>
        {ex?"✕ הסר מנהל עיזבון":"+ הוסף מנהל/ת עיזבון"}
      </button>
      {ex&&<><PersonForm person={ex} onChange={setEx} label="מנהל/ת עיזבון"/>
        {!alt&&<button onClick={()=>setAlt(mkPerson())} style={{width:"100%",padding:"9px",borderRadius:8,border:`1.5px dashed ${C.navyLight}`,background:"transparent",color:C.navyLight,fontWeight:600,fontSize:13,marginBottom:10}}>+ הוסף מחליף/ת</button>}
        {alt&&<><p style={{fontWeight:700,color:C.navy,marginBottom:8,fontSize:13}}>מנהל/ת חלופי/ת</p><PersonForm person={alt} onChange={setAlt} label="מנהל/ת חלופי"/><button onClick={()=>setAlt(null)} style={{background:"none",border:"none",color:C.error,cursor:"pointer",fontSize:12}}>הסר</button></>}
      </>}
    </div>
  </div>;
}

function StepMinorTrust({ data, setData }) {
  const mt=data.distributions.minor_trust, trustee=data.parties.trustee;
  const up=(k,v)=>setData(d=>({...d,distributions:{...d.distributions,minor_trust:{...d.distributions.minor_trust,[k]:v}}}));
  return <div>
    <h2 style={{fontSize:20,color:C.navy,marginBottom:5}}>קטינים — נאמנות</h2>
    <div style={{marginTop:10}}><AudioBtn label="נאמנות" audioKey="minor_trust"/></div>
    {data.parties.beneficiaries.some(b=>b.is_minor)&&<InfoNote type="warning">זיהינו מוטב קטין. מומלץ להגדיר נאמנות.</InfoNote>}
    <div style={{marginTop:14}}>
      <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"12px 14px",background:mt.enabled?"#eef3fc":"#f7f5f0",borderRadius:9,border:`2px solid ${mt.enabled?C.navyLight:C.border}`,marginBottom:14}}>
        <input type="checkbox" checked={mt.enabled} onChange={e=>up("enabled",e.target.checked)} style={{width:"auto",transform:"scale(1.3)"}}/>
        <div><div style={{fontWeight:700,color:C.navy,fontSize:13}}>הפעל נאמנות</div><div style={{fontSize:12,color:C.textMuted}}>מינוי נאמן לניהול נכסי קטינים</div></div>
      </label>
      {mt.enabled&&<><FieldRow><div><Label>גיל ניהול עד</Label><input type="number" min={18} max={40} value={mt.trust_age_until} onChange={e=>up("trust_age_until",Number(e.target.value))}/></div><div><Label>גיל קבלת נכסים</Label><input type="number" min={18} max={40} value={mt.release_age} onChange={e=>up("release_age",Number(e.target.value))}/></div></FieldRow>
        {!trustee?<button onClick={()=>setData(d=>({...d,parties:{...d.parties,trustee:mkPerson()}}))} style={{width:"100%",padding:"11px",borderRadius:9,border:`2px dashed ${C.navyLight}`,background:"transparent",color:C.navyLight,fontWeight:600,cursor:"pointer",fontSize:13}}>+ הוסף נאמן/ת</button>
          :<PersonForm person={trustee} onChange={v=>setData(d=>({...d,parties:{...d.parties,trustee:v}}))} label="נאמן/ת"/>}
      </>}
    </div>
  </div>;
}

function StepMutual({ data, setData }) {
  const mo=data.distributions.mutual_options;
  const up=(k,v)=>setData(d=>({...d,distributions:{...d.distributions,mutual_options:{...d.distributions.mutual_options,[k]:v}}}));

    <div style={{marginTop:14}}>
      <h3 style={{fontSize:14,color:C.navy,marginBottom:9}}>פטירת הראשון — מה יקרה?</h3>
      <ChoiceCard selected={mo.first_death_mode==="all_to_survivor"} onClick={()=>up("first_death_mode","all_to_survivor")} icon="👤" title="הכל לבן/בת הזוג הנותר/ת" subtitle="מלוא העיזבון עובר לבן/בת הזוג."/>
      <ChoiceCard selected={mo.first_death_mode==="split_now"} onClick={()=>up("first_death_mode","split_now")} icon="📊" title="חלוקה מיידית" subtitle="חלק לבן/בת הזוג, חלק לילדים."/>
      {mo.first_death_mode==="split_now"&&<FieldRow><div><Label>% לבן/בת הזוג</Label><input type="number" min={0} max={100} value={mo.first_death_split.survivor_percent} onChange={e=>upS("survivor_percent",Number(e.target.value))}/></div><div><Label>% לילדים</Label><input type="number" min={0} max={100} value={mo.first_death_split.children_percent} onChange={e=>upS("children_percent",Number(e.target.value))}/></div></FieldRow>}
      <div style={{height:1,background:C.border,margin:"16px 0"}}/>
      <h3 style={{fontSize:14,color:C.navy,marginBottom:9}}>סמכויות הנותר/ת</h3>
      <ChoiceCard selected={mo.survivor_powers==="full"} onClick={()=>up("survivor_powers","full")} icon="🔓" title="סמכות מלאה" subtitle="ללא הגבלה."/>
      <ChoiceCard selected={mo.survivor_powers==="limited"} onClick={()=>up("survivor_powers","limited")} icon="🔒" title="סמכות מוגבלת" subtitle="מוגבל/ת בהעברות ונכסים מהותיים."/>
      {mo.survivor_powers==="limited"&&<><div style={{marginBottom:10}}><Label>תקרת מתנות שנתיות (₪)</Label><input type="number" value={mo.gift_cap_amount} onChange={e=>up("gift_cap_amount",Number(e.target.value))}/></div><div><Label>הגדרת "נכס מהותי"</Label><textarea value={mo.material_asset_definition} onChange={e=>up("material_asset_definition",e.target.value)}/></div></>}
    </div>
  </div>;
}

function StepWitnesses({ data, setData }) {
  const upd=(i,v)=>setData(d=>{const w=[...d.parties.witnesses];w[i]=v;return{...d,parties:{...d.parties,witnesses:w}};});
  return <div>
    <h2 style={{fontSize:20,color:C.navy,marginBottom:5}}>פרטי העדים</h2>
    <InfoNote type="important"><strong>חוקית:</strong> עדים לא יכולים להיות מוטבים. שניהם נוכחים בו-זמנית.</InfoNote>
    <div style={{marginTop:14}}>{data.parties.witnesses.map((w,i)=><PersonForm key={i} person={w} onChange={v=>upd(i,v)} label="עד" index={i} showEmail={false}/>)}</div>
  </div>;
}

function StepAuthority({ data, setData }) {
  const auth=data.parties.authority||{};
  const up=(k,v)=>setData(d=>({...d,parties:{...d.parties,authority:{...d.parties.authority,[k]:v}}}));
  return <div>
    <h2 style={{fontSize:20,color:C.navy,marginBottom:5}}>פרטי {data.will.signature_mode==="authority_notary"?"הנוטריון":'עו"ד'}</h2>
    <InfoNote type="info">{data.will.signature_mode==="authority_notary"?"ללא עדים נוספים.":'נדרשים גם 2 עדים.'}</InfoNote>
    <div style={{background:"#f7f5f0",borderRadius:9,padding:14,marginTop:14}}>
      <div style={{marginBottom:12}}><Label>תפקיד</Label><select value={auth.role_label||""} onChange={e=>up("role_label",e.target.value)}><option value="">-- בחר --</option><option value="נוטריון">נוטריון</option><option value="רשם לענייני ירושה">רשם לענייני ירושה</option><option value="עורך דין">עורך דין</option></select></div>
      <FieldRow><div><Label>שם</Label><input value={auth.name||""} onChange={e=>up("name",e.target.value)}/></div><div><Label>רישיון</Label><input value={auth.license_no||""} onChange={e=>up("license_no",e.target.value)}/></div></FieldRow>
    </div>
  </div>;
}

function StepSig({ data, setData }) {
  const up=(k,v)=>setData(d=>({...d,signature:{...d.signature,[k]:v}}));
  return <div>
    <h2 style={{fontSize:20,color:C.navy,marginBottom:14}}>פרטי חתימה</h2>
    <FieldRow><div><Label required>תאריך</Label><input type="date" value={data.signature.date} onChange={e=>up("date",e.target.value)}/></div><div><Label required>עיר</Label><input value={data.signature.city} onChange={e=>up("city",e.target.value)} placeholder="תל אביב"/></div></FieldRow>
  </div>;
}

function StepOutputChoice({ data, setData }) {
  const mode = data.will.signature_mode;
  const choice = data.output_choice;
  const isLawyerOrNotary = mode === "authority_notary" || mode === "lawyer_draft";
  const isSelfOrWitnesses = mode === "witnesses" || mode === "self_sign";

  return <div>
    <h2 style={{fontSize:20,color:C.navy,marginBottom:5}}>כיצד להמשיך?</h2>
    <div style={{marginTop:10}}><AudioBtn label="הפקה" audioKey="output_choice"/></div>
    <div style={{marginTop:14}}>
      <ChoiceCard selected={choice==="self_sign"} onClick={()=>setData(d=>({...d,output_choice:"self_sign"}))} icon="✍️" title="הפק לחתימה עצמית" subtitle="הדפס וחתום בנוכחות עדים. כל הנתונים נשארים בדפדפן שלך בלבד."/>
      <ChoiceCard selected={choice==="lawyer"} onClick={()=>setData(d=>({...d,output_choice:"lawyer"}))} icon="👨‍💼" title='שלח לעו"ד / נוטריון' subtitle='הדפס טיוטה מקצועית לחתימה רשמית — ראה הערת פרטיות למטה.'/>
    </div>

    {/* Privacy notice — self sign / witnesses */}
    {(choice==="self_sign" || (!choice && isSelfOrWitnesses)) && (
      <div style={{marginTop:12,background:"#e8f5ee",border:`1px solid #a8d8b9`,borderRadius:9,padding:"12px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
          <span style={{fontSize:16}}>🔒</span>
          <span style={{fontWeight:700,color:"#1a6e3c",fontSize:13}}>פרטיות מלאה — הנתונים נשארים אצלך</span>
        </div>
        <p style={{fontSize:12.5,lineHeight:1.75,color:"#1a4a2e",margin:0}}>
          כל המידע שהזנת בכלי זה <strong>נשמר בזיכרון הדפדפן בלבד</strong> ואינו נשלח לשום שרת, ענן, או גורם חיצוני.
          הנתונים נמחקים כשסוגרים את הלשונית. הטיוטה שתפיק <strong>תיוצר מקומית על המסך שלך בלבד</strong>.
          מומלץ לשמור את המסמך המוכן כקובץ PDF מקומי מיד לאחר ההפקה.
        </p>
      </div>
    )}

    {/* Privacy notice — lawyer / notary — Amendment 13 */}
    {(choice==="lawyer" || (!choice && isLawyerOrNotary)) && (
      <div style={{marginTop:12,background:"#fff8e6",border:`1px solid ${C.gold}`,borderRadius:9,padding:"12px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:7}}>
          <span style={{fontSize:16}}>⚠️</span>
          <span style={{fontWeight:700,color:C.gold,fontSize:13}}>הודעת פרטיות — העברת מידע לעורך דין / נוטריון</span>
        </div>
        <p style={{fontSize:12.5,lineHeight:1.75,color:"#5a3d00",margin:0,marginBottom:8}}>
          בחרתם להעביר את הטיוטה לגורם מקצועי. יש לדעת כי:
        </p>
        <div style={{fontSize:12.5,lineHeight:1.85,color:"#5a3d00"}}>
          <div style={{marginBottom:5}}>🔐 <strong>חיסיון עורך דין-לקוח:</strong> המידע שתעבירו לעורך הדין / נוטריון מוגן בחיסיון מקצועי מחמיר לפי חוק לשכת עורכי הדין, התשכ"א-1961. עורך הדין אינו רשאי לגלות מידע זה לצד שלישי ללא הסכמתכם.</div>
          <div style={{marginBottom:5}}>🔐 <strong>סודיות מקצועית:</strong> עורך דין ונוטריון כפופים לחובת סודיות מקצועית מחמירה. המידע שתעבירו להם מוגן בחיסיון עורך דין-לקוח.</div>
          <div style={{marginBottom:5}}>📤 <strong>שימו לב:</strong> כאשר אתם מדפיסים ומוסרים את הטיוטה לגורם חיצוני — המידע יוצא ממסגרת הדפדפן המקומי שלכם. ודאו שאתם מוסרים אותו ישירות לאיש המקצוע הנבחר.</div>
          <div>📁 <strong>שמירת רישומים:</strong> עורך הדין רשאי לשמור עותק מהטיוטה בתיק הלקוח בהתאם לכללי לשכת עורכי הדין.</div>
        </div>
        <div style={{marginTop:10,padding:"7px 11px",background:"rgba(255,255,255,0.6)",borderRadius:6,fontSize:12,color:"#7a5500"}}>
          🔗 לקריאה נוספת: <a href="https://www.kolzchut.org.il/he/צוואה_בפני_עדים" target="_blank" rel="noreferrer" style={{color:C.navyLight}}>כל-זכות — צוואה בפני עדים ועורך דין</a>
        </div>
      </div>

function aLL(a){
  if(!a) return "הנכס";
  const t=a.asset_type;
  if(t==="real_estate") return "הנכס"+(a.re_address?" הידוע בכתובת "+a.re_address:a.label?' "'+a.label+'"':"");
  if(t==="bank_account") return "כספים בחשבון בנק"+(a.bank_name?" "+a.bank_name:"")+(a.account_number?" מספר "+a.account_number:"")+(a.branch?" סניף "+a.branch:"");
  if(t==="vehicle") return "הרכב"+(a.vehicle_make?" "+a.vehicle_make:"")+(a.vehicle_model?" "+a.vehicle_model:"")+(a.license_plate?" (רישוי "+a.license_plate+")":"");
  if(t==="business") return "הזכויות בעסק"+(a.label?' "'+a.label+'"':"")+(a.company_number?" (ח.פ. "+a.company_number+")":"");
  if(t==="insurance") return "פוליסת ביטוח"+(a.policy_number?" מספר "+a.policy_number:"")+(a.insurer?" אצל "+a.insurer:"");
  if(t==="investment") return "השקעות/קופות"+(a.label?" — "+a.label:"")+(a.identifier?" ("+a.identifier+")":"");
  if(t==="valuables") return "תכשיטים וחפצי ערך"+(a.label?" — "+a.label:"");
  if(t==="digital") return "נכסים דיגיטליים"+(a.label?" — "+a.label:"");
  return a.label||ASSET_TYPE_LABELS[t]||"נכס";
}

  const todayHe=parseInt(dy)+" ב"+mos[parseInt(mo)-1]+" "+yr;

  let app="";
  if(assets.length>0){
    app+='<div class="app"><div class="apph">נספח א\' — רשימת נכסים</div>';
    assets.forEach((a,i)=>{app+='<div class="appi">'+(i+1)+'. '+aLL(a)+(a.notes?" — "+a.notes:"")+'</div>';});
    app+='</div>';
  }
  const debts=d.debts||[];
  if(debts.length>0){
    app+='<div class="app" style="border-top:1px dashed #e0d8cc;"><div class="apph">נספח ב\' — חובות המצווה/ת</div>';
    debts.forEach((db,i)=>{app+='<div class="appi" style="border-right-color:#ffd0d0;">'+(i+1)+'. '+(db.creditor_name||"___")+(db.amount?" — "+Number(db.amount).toLocaleString()+" "+(db.currency==="ILS"?"₪":db.currency):"")+'</div>';});
    app+='</div>';
  }
  if(credits.length>0){
    app+='<div class="app" style="border-top:1px dashed #e0d8cc;"><div class="apph">נספח ג\' — חובות שחייבים למצווה/ת (לגביית מנהל/ת העיזבון)</div>';
    credits.forEach((c,i)=>{app+='<div class="appi" style="border-right-color:#c8f0c8;">'+(i+1)+'. '+(c.debtor_name||"___")+(c.amount?" — "+Number(c.amount).toLocaleString()+" "+(c.currency==="ILS"?"₪":c.currency):"")+(c.notes?" ("+c.notes+")":"")+'</div>';});
    app+='</div>';
  }

  return CSS+'<div class="wd">'+cover+'<div class="body">'+pre+secs+'</div>'+sigb+app+'</div>';
}

function StepDocPreview({ data }) {
  const isMutual = data.will.type==="mutual";
  const [activeTab, setActiveTab] = useState(0);
  const [copied, setCopied] = useState(false);
  const t1 = data.parties.testators[0]||{};
  const t2 = data.parties.testators[1]||{};

  const doc0 = useMemo(()=>generateSingleDoc(data,0),[data]);
  const doc1 = useMemo(()=>isMutual?generateSingleDoc(data,1):"",[data,isMutual]);
  const activeDoc = activeTab===0 ? doc0 : doc1;

  const copy=()=>{navigator.clipboard.writeText(activeDoc);setCopied(true);setTimeout(()=>setCopied(false),2200);};
  const printDoc=()=>{
    const iframe=document.createElement("iframe");
    iframe.style.cssText="position:fixed;top:-9999px;left:-9999px;width:210mm;height:297mm;border:none;";
    document.body.appendChild(iframe);
    const html='<!DOCTYPE html><html dir="rtl"><head><meta charset="utf-8"/><title>צוואה</title><style>@media print{body{margin:0;}}</style></head><body>'+activeDoc+'</body></html>';
    iframe.contentDocument.open();
    iframe.contentDocument.write(html);
    iframe.contentDocument.close();
    setTimeout(()=>{
      iframe.contentWindow.focus();
      iframe.contentWindow.print();
      setTimeout(()=>document.body.removeChild(iframe),2000);
    },800);
  };

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:8}}>
      <div>
        <h2 style={{fontSize:20,color:C.navy,marginBottom:3}}>{isMutual?"הצוואות מוכנות ✓":"הצוואה מוכנה ✓"}</h2>

      </div>
      <div style={{display:"flex",gap:7}}>
        <button onClick={copy} style={{padding:"7px 12px",borderRadius:7,border:`1.5px solid ${C.navyLight}`,background:copied?C.successBg:"white",color:copied?C.success:C.navyLight,fontWeight:600,fontSize:12}}>{copied?"✓ הועתק":"📋 העתק"}</button>
        <button onClick={printDoc} style={{padding:"7px 12px",borderRadius:7,border:"none",background:C.navy,color:"white",fontWeight:600,fontSize:12}}>🖨️ הדפס</button>
      </div>
    </div>

    {data.output_choice==="lawyer"&&<InfoNote type="warning">טיוטה לעו"ד בלבד — אין לחתום ללא בדיקה מקצועית.</InfoNote>}

    {isMutual&&<>
      <div style={{background:"#fff8e6",border:`1px solid ${C.gold}`,borderRadius:9,padding:"10px 13px",marginBottom:12,fontSize:13,lineHeight:1.75}}>
        <strong>⚖️ צוואה הדדית — שני מסמכים נפרדים</strong><br/>
        על פי סעיף 8א לחוק הירושה: כל בן/בת זוג חותמ/ת על <strong>מסמך נפרד משלו/ה בלבד</strong>, בו-זמנית, בפני אותם עדים. אין לחתום שניהם על אותו דף.
      </div>
      <div style={{display:"flex",gap:2,marginBottom:10,background:"#f0f0f0",borderRadius:8,padding:3}}>
        {[t1.full_name||"בן/בת זוג א'", t2.full_name||"בן/בת זוג ב'"].map((name,i)=>(
          <button key={i} onClick={()=>setActiveTab(i)} style={{flex:1,padding:"8px 6px",borderRadius:6,border:"none",background:activeTab===i?C.navy:"transparent",color:activeTab===i?"white":C.textMuted,fontWeight:activeTab===i?700:400,fontSize:13,cursor:"pointer",transition:"all 0.2s"}}>
            עותק {i===0?"א'":"ב'"} — {name}

// גרסאות — Version Manager (localStorage only)
// ══════════════════════════════════════════════

const LS_KEY = "will_builder_versions";
const MAX_VERSIONS = 10;

const VersionMgr = {
  load: () => {
    try { return JSON.parse(localStorage.getItem(LS_KEY)||"[]"); }
    catch { return []; }
  },
  save: (versions) => {
    try { localStorage.setItem(LS_KEY, JSON.stringify(versions)); return true; }
    catch { return false; }
  },
  saveVersion: (data, meta={}) => {
    const versions = VersionMgr.load();
    const entry = {
      id: Date.now().toString(),
      saved_at: new Date().toISOString(),
      label: meta.label || ("גרסה " + (versions.length+1)),
      changes: meta.changes || [],
      signed: meta.signed || false,
      sign_method: meta.sign_method || "",
      notes: meta.notes || "",
      data: JSON.parse(JSON.stringify(data)),
    };
    const updated = [entry, ...versions].slice(0, MAX_VERSIONS);
    VersionMgr.save(updated);
    return entry;
  },
  deleteVersion: (id) => {
    const versions = VersionMgr.load().filter(v=>v.id!==id);
    VersionMgr.save(versions);
  },
  exportJSON: (data, versions) => {
    const blob = new Blob([JSON.stringify({data, versions, exported_at: new Date().toISOString()}, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "will_backup_" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
  },
  importJSON: (file, onSuccess, onError) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (!parsed.data || !parsed.versions) throw new Error("קובץ לא תקין");
        onSuccess(parsed.data, parsed.versions);
      } catch(err) { onError(err.message); }
    };
    r.readAsText(file);
  },
  exportICS: (intervalMonths) => {
    const now = new Date();
    const future = new Date(now);
    future.setMonth(future.getMonth() + intervalMonths);
    const fmt = d => d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
    const ics = [
      "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//WillBuilder//IL",
      "BEGIN:VEVENT",
      "UID:will-reminder-"+now.getTime()+"@willbuilder",
      "DTSTART:"+fmt(future),
      "DTEND:"+fmt(new Date(future.getTime()+3600000)),
      "SUMMARY:תזכורת — בדיקת עדכון צוואה",
      "DESCRIPTION:האם חל שינוי מהותי שמצריך עדכון הצוואה? לידה\, פטירה\, גירושין\, נכס חדש?",
      "BEGIN:VALARM","TRIGGER:-P1D","ACTION:DISPLAY","DESCRIPTION:תזכורת צוואה","END:VALARM",
      "END:VEVENT","END:VCALENDAR"
    ].join("\r\n");
    const blob = new Blob([ics], {type:"text/calendar"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "will_reminder.ics";
    a.click();
  }
};

const STEP_FOR_CHANGE = {
  born: "beneficiaries", death: "beneficiaries", divorce: "beneficiaries",

function NewVersionWizard({ data, versions, onSave, onCancel, allSteps, setStepIdx }) {
  const [changes, setChanges] = React.useState([]);
  const [notes, setNotes] = React.useState("");
  const [signed, setSigned] = React.useState(false);
  const [signMethod, setSignMethod] = React.useState("");
  const [step, setStep] = React.useState(0); // 0=changes, 1=confirm

  const toggle = k => setChanges(p => p.includes(k)?p.filter(x=>x!==k):[...p,k]);

  const goToChange = (k) => {
    const stepId = STEP_FOR_CHANGE[k];
    if (stepId) {
      const idx = allSteps.findIndex(s=>s.id===stepId);
      if (idx>=0) { setStepIdx(idx); onCancel(); }
    }
  };

  if (step===0) return (
    <div style={{padding:"20px 22px"}}>
      <div style={{fontWeight:700,color:C.navy,fontSize:17,marginBottom:4}}>🔄 גרסה חדשה לצוואה</div>
      <div style={{fontSize:13,color:C.textMuted,marginBottom:18}}>מה השתנה? בחרו את הסיבות לעדכון</div>

      {versions.some(v=>v.signed) && (
        <div style={{background:"#fff8e6",border:`1.5px solid ${C.gold}`,borderRadius:9,padding:"11px 14px",marginBottom:16,fontSize:13,lineHeight:1.75}}>
          <strong>⚠️ שימו לב —</strong> יצירת גרסה חדשה <strong>אינה מבטלת</strong> את הגרסה החתומה הקודמת אוטומטית.<br/>
          לאחר חתימת הגרסה החדשה — יש להפקידה מחדש ברשם ולהשמיד את הגרסה הישנה.
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
        {CHANGE_TYPES.map(({k,icon,label})=>{
          const sel = changes.includes(k);
          return <div key={k} onClick={()=>toggle(k)}
            style={{display:"flex",alignItems:"center",gap:9,padding:"10px 12px",borderRadius:9,border:`2px solid ${sel?C.navyLight:C.border}`,background:sel?"#eef3fc":"white",cursor:"pointer",transition:"all 0.15s"}}>
            <span style={{fontSize:18}}>{icon}</span>
            <span style={{fontSize:12.5,fontWeight:sel?700:400,color:sel?C.navyLight:C.text}}>{label}</span>
          </div>;
        })}
      </div>

      <div style={{marginBottom:14}}>
        <label style={{fontSize:13,fontWeight:600,color:C.navy,display:"block",marginBottom:5}}>הערות (אופציונלי)</label>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="פירוט נוסף על השינויים..." style={{minHeight:55}}/>
      </div>

      <div style={{marginBottom:18,background:"#f7f5f0",borderRadius:9,padding:"11px 13px"}}>
        <div style={{fontWeight:600,color:C.navy,fontSize:13,marginBottom:8}}>הגרסה הקודמת — האם נחתמה?</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {[{v:"",l:"טיוטה בלבד"},{v:"witnesses",l:"חתומה בפני עדים"},{v:"notary",l:"חתומה נוטריון / עו״ד"}].map(({v,l})=>
            <button key={v} onClick={()=>{setSigned(v!=="");setSignMethod(v);}}
              style={{padding:"6px 12px",borderRadius:7,border:`1.5px solid ${signMethod===v?C.navyLight:C.border}`,background:signMethod===v?"#eef3fc":"white",color:signMethod===v?C.navyLight:C.text,fontSize:12,fontWeight:signMethod===v?700:400,cursor:"pointer"}}>
              {l}
            </button>
          )}
        </div>
        {signed && <div style={{marginTop:10,fontSize:12,color:C.error,lineHeight:1.7}}>
          ⚠️ <strong>חשוב:</strong> יש לחתום על הגרסה החדשה מחדש בפני עדים / נוטריון<br/>
          ולהפקיד מחדש ברשם לענייני ירושה (לאחר משיכת הגרסה הישנה)
        </div>}
      </div>

      <div style={{display:"flex",gap:10}}>
        <button onClick={onCancel} style={{flex:1,padding:"10px",borderRadius:8,border:`1.5px solid ${C.border}`,background:"white",color:C.text,fontWeight:600,fontSize:13,cursor:"pointer"}}>ביטול</button>
        <button onClick={()=>setStep(1)} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.navyLight},${C.navy})`,color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>המשך ▸</button>
      </div>
    </div>
  );

  return (
    <div style={{padding:"20px 22px"}}>
      <div style={{fontWeight:700,color:C.navy,fontSize:17,marginBottom:16}}>📋 לאן לנווט לעדכן?</div>
      <div style={{fontSize:13,color:C.textMuted,marginBottom:14}}>לחצו על סעיף כדי לנווט ישירות אליו:</div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
        {(changes.length>0 ? CHANGE_TYPES.filter(c=>changes.includes(c.k)) : CHANGE_TYPES).map(({k,icon,label})=>{
          const stepId = STEP_FOR_CHANGE[k];
          const stepExists = allSteps.some(s=>s.id===stepId);
          return <button key={k} onClick={()=>goToChange(k)}
            style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderRadius:9,border:`1.5px solid ${C.border}`,background:"#f7f5f0",cursor:stepExists?"pointer":"default",textAlign:"right",opacity:stepExists?1:0.5}}>
            <span style={{fontSize:18}}>{icon}</span>
            <span style={{flex:1,fontSize:13,fontWeight:600}}>{label}</span>
            {stepExists && <span style={{color:C.navyLight,fontSize:18}}>←</span>}
          </button>;
        })}
      </div>
      <button onClick={()=>{onSave({changes,notes,signed,sign_method:signMethod});}}
        style={{width:"100%",padding:"12px",borderRadius:9,border:"none",background:`linear-gradient(135deg,${C.navyLight},${C.navy})`,color:"white",fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:8}}>
        💾 שמור גרסה נוכחית ועדכן
      </button>
      <button onClick={()=>setStep(0)} style={{width:"100%",padding:"9px",borderRadius:8,border:`1.5px solid ${C.border}`,background:"white",color:C.text,fontWeight:600,fontSize:13,cursor:"pointer"}}>◂ חזור</button>
    </div>
  );
}

function WillBuilder() {
  const [data,setData]=useState(INITIAL);
  const [stepIdx,setStepIdx]=useState(0);
  const [versions,setVersions]=useState(()=>VersionMgr.load());
  const [showVersions,setShowVersions]=useState(false);
  const [showNewVersion,setShowNewVersion]=useState(false);

  const refreshVersions = () => setVersions(VersionMgr.load());

  const handleSaveVersion = (meta) => {
    VersionMgr.saveVersion(data, meta);
    refreshVersions();
    setShowNewVersion(false);
    setShowVersions(false);
  };

  const handleRestore = (v) => {
    setData(v.data);
    setStepIdx(0);
    setShowVersions(false);
  };

  const handleDelete = (id) => {
    VersionMgr.deleteVersion(id);
    refreshVersions();
  };

  const handleExport = () => VersionMgr.exportJSON(data, versions);

  useEffect(() => {
    window._openVersions = () => setShowVersions(true);
    return () => { delete window._openVersions; };
  }, []);

  const handleImport = (file, onOk, onErr) => {
    VersionMgr.importJSON(file,
      (importedData, importedVersions) => {
        setData(importedData);
        VersionMgr.save(importedVersions);
        refreshVersions();
        setStepIdx(0);
        setShowVersions(false);
        onOk();
      },
      onErr
    );
  };

  const allSteps=useMemo(()=>[
    {id:"welcome",label:"ברוכים הבאים"},
    {id:"will_type",label:"סוג הצוואה"},
    {id:"signature_mode",label:"מסלול חתימה"},
    {id:"testators",label:data.will.type==="mutual"?"פרטי המצווים":"פרטי המצווה"},
    {id:"beneficiaries",label:"מוטבים"},
    {id:"assets",label:"נכסים"},
    {id:"debts",label:"חובות שלי"},
    {id:"credits",label:"חובות לי"},
    {id:"specific_gifts",label:"ייעוד נכסים"},
    {id:"residual",label:"חלוקת עיזבון"},
    {id:"predeceased",label:"מוטב שנפטר"},
    {id:"executor",label:"מנהל עיזבון"},
    {id:"minor_trust",label:"קטינים"},
    ...(data.will.type==="mutual"?[{id:"mutual",label:"אפשרויות הדדית"}]:[]),
    ...(data.will.signature_mode==="witnesses"?[{id:"witnesses",label:"עדים"}]:[]),
    ...((data.will.signature_mode==="authority_notary"||data.will.signature_mode==="lawyer_draft")?[{id:"authority",label:'נוטריון/עו"ד'}]:[]),
    {id:"no_contest",label:"סעיף אי-ערעור"},
    {id:"sig",label:"פרטי חתימה"},
    {id:"output_choice",label:"בחירת פלט"},
    {id:"send_lawyer",label:'שלח לעו"ד'},
    {id:"doc_preview",label:"הצוואה המוכנה"},
    {id:"deposit",label:"הפקדה ברשם"},
  ],[data.will.type,data.will.signature_mode]);

  const cur=allSteps[stepIdx]||allSteps[0];
  const pct=Math.round((stepIdx/(allSteps.length-1))*100);
  const isLast=stepIdx===allSteps.length-1;

  const canNext=useMemo(()=>{
    if(cur.id==="welcome") return !!data.privacy_accepted;
    if(cur.id==="will_type") return !!data.will.type;
    if(cur.id==="signature_mode") return !!data.will.signature_mode;
    if(cur.id==="testators") return data.parties.testators.every(t=>t.full_name&&t.id_number&&t.address);
    if(cur.id==="beneficiaries") return data.parties.beneficiaries.length>0&&data.parties.beneficiaries.every(b=>b.full_name&&b.id_number);
    if(cur.id==="residual") return data.distributions.residual.mode==="equal"||data.distributions.residual.percentages.reduce((s,p)=>s+p.percent,0)===100;
    if(cur.id==="output_choice") return !!data.output_choice;
    return true;
  },[cur.id,data]);

  const p={data,setData};
  const renderStep=()=>{
    switch(cur.id){
      case "welcome": return <StepWelcome {...p}/>;
      case "will_type": return <StepWillType {...p}/>;
      case "signature_mode": return <StepSignatureMode {...p}/>;
      case "testators": return <StepTestators {...p}/>;
      case "beneficiaries": return <StepBeneficiaries {...p}/>;
      case "assets": return <StepAssets {...p}/>;
      case "debts": return <StepDebts {...p}/>;
      case "credits": return <StepCredits {...p}/>;
      case "specific_gifts": return <StepGifts {...p}/>;
      case "residual": return <StepResidual {...p}/>;
      case "predeceased": return <StepPredeceased {...p}/>;
      case "executor": return <StepExecutor {...p}/>;
      case "minor_trust": return <StepMinorTrust {...p}/>;
      case "mutual": return <StepMutual {...p}/>;
      case "witnesses": return <StepWitnesses {...p}/>;
      case "authority": return <StepAuthority {...p}/>;
      case "no_contest": return <StepNoContest {...p}/>;
      case "sig": return <StepSig {...p}/>;
      case "output_choice": return <StepOutputChoice {...p}/>;
      case "send_lawyer": return <StepSendLawyer {...p}/>;
      case "doc_preview": return <StepDocPreview data={data}/>;
      case "deposit": return <StepDeposit/>;
      default: return null;
    }
  };

  return <>
    <style>{GLOBAL_CSS}</style>
    {showVersions && !showNewVersion &&
      <VersionPanel
        versions={versions}
        currentData={data}
        onRestore={handleRestore}
        onDelete={handleDelete}
        onClose={()=>setShowVersions(false)}
        onNewVersion={()=>setShowNewVersion(true)}
        onExport={handleExport}
        onImport={handleImport}
      />
    }
    {showNewVersion &&
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(14,22,50,0.65)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px 12px"}}>
        <div style={{background:"white",borderRadius:14,width:"100%",maxWidth:480,boxShadow:"0 20px 60px rgba(0,0,0,0.3)",maxHeight:"90vh",overflowY:"auto"}}>
          <NewVersionWizard
            data={data}
            versions={versions}
            onSave={handleSaveVersion}
            onCancel={()=>setShowNewVersion(false)}
            allSteps={allSteps}
            setStepIdx={setStepIdx}
          />
        </div>
      </div>
    }
    <div style={{fontFamily:"'Heebo','Segoe UI',Arial,sans-serif",direction:"rtl",minHeight:"100vh",background:"linear-gradient(160deg,#e8eaf6 0%,#f0ede6 55%,#ede8df 100%)"}}>
      <div style={{background:C.navyDark,padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <span style={{fontSize:18}}>⚖️</span>
          <div style={{color:"white",fontWeight:700,fontSize:13,fontFamily:"'Frank Ruhl Libre',Georgia,serif"}}>תכנון וניסוח צוואה</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {data.will.type&&<Tag color={data.will.type==="mutual"?"#6b4c9a":C.navyLight}>{data.will.type==="mutual"?"הדדית":"אישית"}</Tag>}
          {data.will.signature_mode&&<Tag color={C.gold}>{data.will.signature_mode==="witnesses"?"עדים":data.will.signature_mode==="authority_notary"?"נוטריון":'עו"ד'}</Tag>}
          <button onClick={()=>setShowVersions(true)}
            style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
            📚 גרסאות {versions.length>0&&<span style={{background:C.gold,color:C.navyDark,borderRadius:10,padding:"0px 5px",fontSize:10,fontWeight:700}}>{versions.length}</span>}
          </button>
        </div>
      </div>

      {/* Progress */}
      <div style={{background:C.navy,padding:"9px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:11}}>
          <span style={{color:"rgba(255,255,255,0.6)"}}>שלב {stepIdx+1}/{allSteps.length}</span>
          <span style={{color:C.goldLight,fontWeight:700}}>{cur.label}</span>
          <span style={{color:"rgba(255,255,255,0.6)"}}>{pct}%</span>
        </div>
        <div style={{height:3,background:"rgba(255,255,255,0.12)",borderRadius:2}}>
          <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${C.goldLight},#e8c44a)`,borderRadius:2,transition:"width 0.4s"}}/>
        </div>
      </div>

      {/* Step tabs */}
      <div style={{background:C.navy,display:"flex",gap:2,padding:"0 12px 8px",overflowX:"auto"}}>
        {allSteps.map((s,i)=><button key={s.id} onClick={()=>setStepIdx(i)}
          style={{flexShrink:0,padding:"2px 7px",borderRadius:10,border:"none",background:i===stepIdx?C.goldLight:i<stepIdx?"rgba(255,255,255,0.22)":"rgba(255,255,255,0.06)",color:i===stepIdx?C.navyDark:i<stepIdx?"rgba(255,255,255,0.7)":"rgba(255,255,255,0.3)",fontSize:10,fontWeight:i===stepIdx?700:400,cursor:"pointer",whiteSpace:"nowrap"}}>
          {s.label}
        </button>)}
      </div>

      {/* Content */}
      <div style={{maxWidth:600,margin:"0 auto",padding:"16px 12px 40px"}}>
        <div style={{background:"white",borderRadius:12,padding:"20px 20px 16px",boxShadow:"0 4px 20px rgba(30,45,90,0.10)",border:`1px solid ${C.border}`}}>
          <div style={{maxHeight:"calc(100vh - 260px)",overflowY:"auto",paddingLeft:1}}>
            {renderStep()}
          </div>
          <div style={{display:"flex",gap:10,marginTop:18,justifyContent:"space-between",borderTop:`1px solid ${C.border}`,paddingTop:14}}>
            <button onClick={()=>setStepIdx(i=>Math.max(0,i-1))} disabled={stepIdx===0}
              style={{padding:"9px 18px",borderRadius:8,border:`1.5px solid ${C.border}`,background:"white",color:stepIdx===0?C.textLight:C.text,fontSize:13,fontWeight:600,opacity:stepIdx===0?0.4:1,cursor:stepIdx===0?"default":"pointer"}}>◂ חזור</button>
            <button onClick={()=>setStepIdx(i=>Math.min(allSteps.length-1,i+1))} disabled={!canNext&&!isLast}
              style={{padding:"9px 22px",borderRadius:8,border:"none",background:(!canNext&&!isLast)?"#b0b8cc":`linear-gradient(135deg,${C.navyLight},${C.navy})`,color:"white",fontSize:13,fontWeight:700,cursor:(!canNext&&!isLast)?"default":"pointer",boxShadow:(!canNext&&!isLast)?"none":"0 4px 12px rgba(30,45,90,0.28)"}}>
              {isLast?"✓ סיום":cur.id==="doc_preview"?"המשך ▸":"המשך ▸"}
            </button>
          </div>
        </div>
        <div style={{marginTop:12,textAlign:"center",fontSize:11,color:C.textMuted}}>⚖️ כלי זה מיועד לסיוע בהכנת טיוטה בלבד — אין בו ייעוץ משפטי.</div>
      </div>
    </div>
  </>;
}

const domRoot = ReactDOM.createRoot(document.getElementById("root"));
domRoot.render(React.createElement(WillBuilder));
document.getElementById("loading").style.display="none";
  </script>
</body>
</html>
